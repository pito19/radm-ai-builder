name: Build RADM AI ISO v4.0 (Air-Gap)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-iso:
    runs-on: ubuntu-24.04
    timeout-minutes: 480

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ============================================================
      # INSTALL DEPENDANCES (sans dos2unix)
      # ============================================================
      - name: Install dependencies
        run: |
          sudo apt update
          sudo sed -i 's/azure.archive.ubuntu.com/archive.ubuntu.com/g' /etc/apt/sources.list
          sudo apt update
          sudo apt install -y xorriso whois gnupg wget unzip dpkg-dev
          echo "✅ Dependances installees"

      # ============================================================
      # CACHE - Ubuntu ISO
      # ============================================================
      - name: Cache Ubuntu ISO
        id: cache-iso
        uses: actions/cache@v4
        with:
          path: ubuntu-24.04.4-live-server-amd64.iso
          key: ubuntu-iso-24.04.4-${{ hashFiles('build.sh') }}
          restore-keys: |
            ubuntu-iso-24.04.4-

      - name: Download Ubuntu ISO (if not cached)
        if: steps.cache-iso.outputs.cache-hit != 'true'
        run: |
          echo "Telechargement de l'ISO Ubuntu 24.04.4..."
          for i in 1 2 3; do
            echo "Tentative $i/3..."
            if wget --progress=bar:force --timeout=300 --tries=3 \
                 -O ubuntu-24.04.4-live-server-amd64.iso \
                 https://releases.ubuntu.com/24.04.4/ubuntu-24.04.4-live-server-amd64.iso; then
              echo "✅ ISO telechargee"
              break
            else
              echo "⚠️ Echec du telechargement, nouvelle tentative dans 10s..."
              sleep 10
            fi
          done
          ls -lh ubuntu-24.04.4-live-server-amd64.iso

      - name: Verify ISO checksum
        run: |
          echo "Verification du checksum officiel..."
          if wget -q --timeout=30 https://releases.ubuntu.com/24.04.4/SHA256SUMS -O SHA256SUMS.orig; then
            grep "ubuntu-24.04.4-live-server-amd64.iso" SHA256SUMS.orig > CHECKSUM.orig
            if sha256sum -c CHECKSUM.orig 2>/dev/null; then
              echo "✅ Checksum ISO valide"
            else
              echo "⚠️ Checksum non verifie (build continue)"
            fi
          else
            echo "⚠️ Impossible de telecharger le checksum (build continue)"
          fi

      # ============================================================
      # CACHE - Paquets APT
      # ============================================================
      - name: Cache APT packages
        id: cache-apt
        uses: actions/cache@v4
        with:
          path: radm-repo/pool/main
          key: radm-apt-cache-v4-${{ runner.os }}-${{ hashFiles('config/packages.lock', 'build.sh') }}
          restore-keys: |
            radm-apt-cache-v4-${{ runner.os }}-

      - name: Prepare APT cache marker
        if: steps.cache-apt.outputs.cache-hit == 'true'
        run: |
          echo "Cache APT trouve - utilisation directe"
          mkdir -p radm-repo/dists/stable/main/binary-amd64
          touch radm-repo/cache-hit.marker

      # ============================================================
      # BUILD DE L'ISO
      # ============================================================
      - name: Fix line endings
        run: |
          sed -i 's/\r$//' build.sh
          chmod +x build.sh
          echo "✅ build.sh pret"

      - name: Run build script
        run: ./build.sh

      # ============================================================
      # VERIFICATION DES ARTEFACTS
      # ============================================================
      - name: List generated files
        run: |
          echo "Fichiers generes :"
          ls -la radm-ai-v4.0-*.iso* 2>/dev/null || echo "No ISO files found"
          ls -la *.sbom.json 2>/dev/null || echo "No SBOM found"

      # ============================================================
      # UPLOAD DES ARTEFACTS
      # ============================================================
      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: radm-ai-v4.0-airgap-iso
          path: |
            radm-ai-v4.0-*.iso
            radm-ai-v4.0-*.iso.sha256
            radm-ai-v4.0-*.iso.asc
            radm-ai-v4.0-*.pubkey
            radm-ai-v4.0-*.sbom.json
          compression-level: 0
          retention-days: 30

      # ============================================================
      # SAUVEGARDE DU CACHE APT
      # ============================================================
      - name: Save APT cache (if changed)
        if: steps.cache-apt.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: radm-repo/pool/main
          key: radm-apt-cache-v4-${{ runner.os }}-${{ hashFiles('config/packages.lock', 'build.sh') }}