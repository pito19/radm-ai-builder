name: Build RADM AI ISO v3.0 (Air-Gap)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-iso:
    runs-on: ubuntu-24.04
    timeout-minutes: 480  # 8 heures max

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y xorriso whois gnupg wget unzip dos2unix dpkg-dev

      # ============================================================
      # CACHE - Ubuntu ISO (réutilisable entre builds)
      # ============================================================
      - name: Cache Ubuntu ISO
        id: cache-iso
        uses: actions/cache@v4
        with:
          path: ubuntu-24.04.4-live-server-amd64.iso
          key: ubuntu-iso-24.04.4-${{ hashFiles('build-v3.sh') }}
          restore-keys: |
            ubuntu-iso-24.04.4-

      - name: Download Ubuntu ISO (if not cached)
        if: steps.cache-iso.outputs.cache-hit != 'true'
        run: |
          echo "📦 Téléchargement de l'ISO Ubuntu 24.04.4..."
          wget --progress=bar:force \
               -O ubuntu-24.04.4-live-server-amd64.iso \
               https://releases.ubuntu.com/24.04.4/ubuntu-24.04.4-live-server-amd64.iso
          ls -lh ubuntu-24.04.4-live-server-amd64.iso

      - name: Verify ISO checksum
        run: |
          echo "🔐 Vérification du checksum officiel..."
          wget -q https://releases.ubuntu.com/24.04.4/SHA256SUMS -O SHA256SUMS.orig
          grep "ubuntu-24.04.4-live-server-amd64.iso" SHA256SUMS.orig > CHECKSUM.orig
          sha256sum -c CHECKSUM.orig
          echo "✅ Checksum ISO validé"

      # ============================================================
      # CACHE - Paquets APT (réutilisable entre builds)
      # ============================================================
      - name: Cache APT packages
        id: cache-apt
        uses: actions/cache@v4
        with:
          path: radm-repo/pool/main
          key: radm-apt-cache-v3-${{ runner.os }}-${{ hashFiles('build-v3.sh') }}
          restore-keys: |
            radm-apt-cache-v3-${{ runner.os }}-
            radm-apt-cache-v3-

      - name: Prepare APT cache marker
        if: steps.cache-apt.outputs.cache-hit == 'true'
        run: |
          echo "✅ Cache APT trouvé - ${{ steps.cache-apt.outputs.cache-hit }} paquets"
          # Créer la structure du repo pour que build-v3.sh continue
          mkdir -p radm-repo/dists/stable/main/binary-amd64
          touch radm-repo/cache-hit.marker

      # ============================================================
      # Build de l'ISO
      # ============================================================
      - name: Convert script to Unix format
        run: dos2unix build-v3.sh

      - name: Make build script executable
        run: chmod +x build-v3.sh

      - name: Run build script
        run: |
          set -x
          ./build-v3.sh
        shell: bash

      # ============================================================
      # Vérification des artefacts
      # ============================================================
      - name: List generated files
        run: |
          echo "📀 Fichiers générés :"
          ls -la radm-ai-v3.0-*.iso* 2>/dev/null || echo "No ISO files found"
          ls -la *.sbom.json 2>/dev/null || echo "No SBOM found"

      # ============================================================
      # Upload des artefacts
      # ============================================================
      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: radm-ai-v3.0-airgap-iso
          path: |
            radm-ai-v3.0-*.iso
            radm-ai-v3.0-*.iso.sha256
            radm-ai-v3.0-*.iso.asc
            radm-ai-v3.0-*.pubkey
            radm-ai-v3.0-*.sbom.json
            sbom/package-list.txt
          compression-level: 0
          retention-days: 30

      # ============================================================
      # (Optionnel) Upload du cache APT pour les prochains builds
      # ============================================================
      - name: Save APT cache (if changed)
        if: steps.cache-apt.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: radm-repo/pool/main
          key: radm-apt-cache-v3-${{ runner.os }}-${{ hashFiles('build-v3.sh') }}