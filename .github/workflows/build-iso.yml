name: TEST - Minimal Build

on:
  workflow_dispatch:

jobs:
  build-iso:
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create minimal test script
        run: |
          cat > build-minimal.sh << 'EOF'
          #!/bin/bash
          set -e
          echo "=== TEST MINIMAL ==="
          echo "Le script s'exécute correctement"
          exit 0
          EOF

      - name: Make script executable
        run: chmod +x build-minimal.sh

      - name: Run test script
        run: ./build-minimal.sh
