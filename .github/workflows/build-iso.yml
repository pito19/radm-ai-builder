name: Build RADM AI ISO v1.0

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-iso:
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y xorriso whois gnupg wget unzip dos2unix

      - name: Install QEMU
        run: sudo apt install -y qemu-system-x86 qemu-utils

      - name: Install Packer 1.15.3
        run: |
          wget https://releases.hashicorp.com/packer/1.15.3/packer_1.15.3_linux_amd64.zip
          sudo unzip -o packer_1.15.3_linux_amd64.zip -d /usr/local/bin/
          rm packer_1.15.3_linux_amd64.zip
          packer --version

      - name: Install Packer QEMU plugin
        run: packer plugins install github.com/hashicorp/qemu

      - name: Download Ubuntu ISO 24.04.3
        run: |
          echo "Téléchargement de l'ISO Ubuntu 24.04.3..."
          wget --user-agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" \
               --progress=bar:force \
               -O ubuntu-24.04.3-live-server-amd64.iso \
               https://old-releases.ubuntu.com/releases/noble/ubuntu-24.04.3-live-server-amd64.iso
          ls -lh ubuntu-24.04.3-live-server-amd64.iso

      - name: Verify ISO checksum
        run: |
          echo "fd6bc7d673159ae03d37d2f12248b54bebc604aca47795573a23ba03c488ffd3  ubuntu-24.04.3-live-server-amd64.iso" > CHECKSUM
          sha256sum -c CHECKSUM
          echo "✅ Checksum vérifié"

      - name: Convert script to Unix format
        run: dos2unix build.sh

      - name: Make build script executable
        run: chmod +x build.sh

      - name: Debug script
        run: |
          echo "=== Script content check ==="
          head -20 build.sh
          echo "=== Script size ==="
          ls -la build.sh
          echo "=== First line check ==="
          head -1 build.sh | od -c

      - name: Run build script
        run: |
          set -x
          ./build.sh
        shell: bash

      - name: List generated files
        run: ls -la *.iso* 2>/dev/null || echo "No ISO files found"

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: radm-ai-v1.0-iso
          path: |
            radm-ai-v1.0-*.iso
            radm-ai-v1.0-*.iso.sha256
            radm-ai-v1.0-*.iso.asc
            radm-ai-v1.0-*.pubkey
          compression-level: 0
          retention-days: 30