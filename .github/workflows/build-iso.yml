name: Build RADM AI ISO v1.0

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-iso:
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y xorriso whois gnupg wget unzip dos2unix

      - name: Install Packer 1.11.2
        run: |
          wget https://releases.hashicorp.com/packer/1.11.2/packer_1.11.2_linux_amd64.zip
          sudo unzip -o packer_1.11.2_linux_amd64.zip -d /usr/local/bin/
          rm packer_1.11.2_linux_amd64.zip
          packer --version

      - name: Install Packer ISO plugin
        run: |
          packer plugins install github.com/hashicorp/iso

      - name: Convert script to Unix format
        run: dos2unix build.sh

      - name: Make build script executable
        run: chmod +x build.sh

      - name: Debug script
        run: |
          echo "=== Script content check ==="
          head -20 build.sh
          echo "=== Script size ==="
          ls -la build.sh
          echo "=== First line check ==="
          head -1 build.sh | od -c

      - name: Run build script
        run: |
          set -x
          ./build.sh
        shell: bash

      - name: List generated files
        run: ls -la *.iso* 2>/dev/null || echo "No ISO files found"

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: radm-ai-v1.0-iso
          path: |
            radm-ai-v1.0-*.iso
            radm-ai-v1.0-*.iso.sha256
            radm-ai-v1.0-*.iso.asc
            radm-ai-v1.0-*.pubkey
          compression-level: 0
          retention-days: 30