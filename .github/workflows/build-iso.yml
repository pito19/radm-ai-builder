name: Build RADM AI ISO v4.0 (Air-Gap)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-iso:
    runs-on: ubuntu-latest
    timeout-minutes: 480

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo rm -rf /var/lib/apt/lists/*
          sudo apt clean
          sudo apt update
          sudo apt install -y xorriso whois gnupg wget unzip dpkg-dev --fix-missing
          echo "✅ Dependances installees"

      - name: Cache Ubuntu ISO
        id: cache-iso
        uses: actions/cache@v4
        with:
          path: ubuntu-24.04.4-live-server-amd64.iso
          key: ubuntu-iso-24.04.4-${{ hashFiles('build.sh') }}
          restore-keys: |
            ubuntu-iso-24.04.4-

      - name: Download Ubuntu ISO (if not cached)
        if: steps.cache-iso.outputs.cache-hit != 'true'
        run: |
          echo "Telechargement de l'ISO Ubuntu 24.04.4..."
          wget -O ubuntu-24.04.4-live-server-amd64.iso \
               https://releases.ubuntu.com/24.04.4/ubuntu-24.04.4-live-server-amd64.iso
          ls -lh ubuntu-24.04.4-live-server-amd64.iso

      - name: Verify ISO checksum
        run: |
          wget -q https://releases.ubuntu.com/24.04.4/SHA256SUMS -O SHA256SUMS.orig
          grep "ubuntu-24.04.4-live-server-amd64.iso" SHA256SUMS.orig > CHECKSUM.orig
          sha256sum -c CHECKSUM.orig || echo "⚠️ Checksum non verifie"

      - name: Cache APT packages
        id: cache-apt
        uses: actions/cache@v4
        with:
          path: radm-repo/pool/main
          key: radm-apt-cache-v4-${{ runner.os }}-${{ hashFiles('config/packages.lock', 'build.sh') }}
          restore-keys: |
            radm-apt-cache-v4-${{ runner.os }}-

      - name: Prepare APT cache marker
        if: steps.cache-apt.outputs.cache-hit == 'true'
        run: |
          mkdir -p radm-repo/dists/stable/main/binary-amd64
          touch radm-repo/cache-hit.marker

      - name: Fix line endings
        run: |
          sed -i 's/\r$//' build.sh
          chmod +x build.sh

      - name: Run build script
        run: ./build.sh

      - name: List generated files
        run: ls -la radm-ai-v4.0-*.iso* 2>/dev/null || echo "No ISO files found"

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: radm-ai-v4.0-airgap-iso
          path: |
            radm-ai-v4.0-*.iso
            radm-ai-v4.0-*.iso.sha256
            radm-ai-v4.0-*.iso.asc
            radm-ai-v4.0-*.pubkey
            radm-ai-v4.0-*.sbom.json
          compression-level: 0
          retention-days: 30

      - name: Save APT cache (if changed)
        if: steps.cache-apt.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: radm-repo/pool/main
          key: radm-apt-cache-v4-${{ runner.os }}-${{ hashFiles('config/packages.lock', 'build.sh') }}